[[package]]
name = "voicevox-openai-tts"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "httpx" },
    { name = "pydantic" },
    { name = "uvicorn" },
]

[package.optional-dependencies]
example = [
    { name = "loguru" },
    { name = "openai" },
]

[package.dev-dependencies]
dev = [
    { name = "pre-commit" },
    { name = "pylint" },
    { name = "pytest" },
    { name = "pytest-asyncio" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "fastapi", specifier = ">=0.135.2" },
    { name = "httpx", specifier = ">=0.28.1" },
    { name = "loguru", marker = "extra == 'example'", specifier = ">=0.7.3" },
    { name = "openai", marker = "extra == 'example'", specifier = ">=1.101.0" },
    { name = "pydantic", specifier = ">=2.12.5" },
    { name = "uvicorn", specifier = ">=0.42.0" },
]
provides-extras = ["example"]

[package.metadata.requires-dev]
dev = [
    { name = "pre-commit", specifier = ">=4.3.0" },
    { name = "pylint", specifier = ">=3.3.8" },
    { name = "pytest", specifier = ">=8.4.1" },
    { name = "pytest-asyncio", specifier = ">=0.23.0" },
    { name = "ruff", specifier = ">=0.12.10" },
]

