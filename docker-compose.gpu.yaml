services:
  voicevox_engine:
    # VOICEVOX Engine Docker image (GPU version)
    image: voicevox/voicevox_engine:nvidia-latest
    ports:
      - '50021:50021'
    tty: true
    # Enable GPU support
    gpus: all
    restart: unless-stopped
    # Health monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50021/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  openai_tts_api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - VOICEVOX_ENGINE_URL=http://voicevox_engine:50021
      - VOICE_MAPPINGS_PATH=/app/voice_mappings.json
    depends_on:
      - voicevox_engine
    restart: unless-stopped
    volumes:
      - ./voice_mappings/voicevox.json:/app/voice_mappings.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
