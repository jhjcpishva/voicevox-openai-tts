services:
  voicevox_engine:
    # Official AivisSpeech Engine Docker image (CPU version)
    image: ghcr.io/aivis-project/aivisspeech-engine:cpu-latest
    ports:
      - '10101:10101'
    tty: true
    restart: unless-stopped
    # Health monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10101/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  openai_tts_api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - VOICEVOX_ENGINE_URL=http://voicevox_engine:10101
      - VOICE_MAPPINGS_PATH=/app/voice_mappings.json
    depends_on:
      - voicevox_engine
    restart: unless-stopped
    volumes:
      - ./voice_mappings/aivis-speech.json:/app/voice_mappings.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
